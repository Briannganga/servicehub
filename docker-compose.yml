version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: service_hub
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: test123
      DB_NAME: service_hub
      DB_PORT: 5432
      JWT_SECRET: supersecurekey
      ALLOWED_ORIGINS: http://localhost:5000
    depends_on:
      - db

volumes:
  db_data:
